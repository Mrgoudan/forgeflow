name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e .
      - name: Configure git (worktree blocks need an identity)
        run: |
          git config --global user.email ci@ci.invalid
          git config --global user.name ci
      - name: Tests
        run: python -m unittest discover -s tests -v
      - name: Genericity gate
        run: ./scripts/check_generic.sh
